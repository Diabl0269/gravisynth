name: ASAN

on:
  pull_request:
    branches: [ "main" ]
    types: [labeled]

jobs:
  build-and-test-asan:
    name: Build and Test (ASAN)
    if: github.event.label.name == 'run-asan'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: cmake ninja-build libasound2-dev libx11-dev libxinerama-dev libxext-dev libxcomposite-dev libxcursor-dev libxrandr-dev libxrender-dev libfontconfig1-dev libfreetype6-dev libglu1-mesa-dev libcurl4-openssl-dev libgtk-3-dev libjack-jackd2-dev freeglut3-dev pkg-config clang xvfb
        version: 1.0

    - name: Cache FetchContent Dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt', 'Tests/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Configure CMake
      run: |
        export CC=clang
        export CXX=clang++
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
          -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

    - name: Build
      run: cmake --build build --target GravisynthTests

    - name: Run Tests
      run: xvfb-run ./build/Tests/GravisynthTests
      env:
        ASAN_OPTIONS: detect_leaks=0
