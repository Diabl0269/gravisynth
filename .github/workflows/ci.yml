name: Gravisynth CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Source/**'
      - 'Tests/**'
      - 'CMakeLists.txt'
      - 'Tests/CMakeLists.txt'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format
    - name: Check Formatting
      run: find Source Tests -name "*.h" -o -name "*.cpp" | xargs clang-format --dry-run --Werror

  build-and-test:
    name: Build, Test, and Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: cmake ninja-build libasound2-dev libx11-dev libxinerama-dev libxext-dev libxcomposite-dev libxcursor-dev libxrandr-dev libxrender-dev libfontconfig1-dev libfreetype6-dev libglu1-mesa-dev libcurl4-openssl-dev libgtk-3-dev libjack-jackd2-dev freeglut3-dev pkg-config llvm clang ccache xvfb
        version: 1.0

    - name: Cache FetchContent Dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt', 'Tests/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=500M
        ccache --zero-stats

    - name: Configure CMake
      run: |
        # Use clang for consistent coverage flags
        export CC=clang
        export CXX=clang++
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_COVERAGE=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build

    - name: ccache Stats
      run: ccache --show-stats

    - name: Run Tests
      run: |
        export LLVM_PROFILE_FILE="default.profraw"
        xvfb-run ./build/Tests/GravisynthTests

    - name: Check Coverage
      run: xvfb-run bash scripts/coverage.sh --report-only

    - name: Upload Coverage Artifact (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          default.profdata
          default.profraw

  build-and-test-release:
    name: Build and Test (Release)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: cmake ninja-build libasound2-dev libx11-dev libxinerama-dev libxext-dev libxcomposite-dev libxcursor-dev libxrandr-dev libxrender-dev libfontconfig1-dev libfreetype6-dev libglu1-mesa-dev libcurl4-openssl-dev libgtk-3-dev libjack-jackd2-dev freeglut3-dev pkg-config llvm clang ccache xvfb
        version: 1.0

    - name: Cache FetchContent Dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt', 'Tests/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-release-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-release-ccache-

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=500M
        ccache --zero-stats

    - name: Configure CMake
      run: |
        export CC=clang
        export CXX=clang++
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build

    - name: Run Tests
      run: xvfb-run ./build/Tests/GravisynthTests

  build-and-test-macos:
    name: Build and Test (macOS)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install cmake ninja ccache

    - name: Cache FetchContent Dependencies
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt', 'Tests/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/ccache
        key: ${{ runner.os }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=500M
        ccache --zero-stats

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build

    - name: ccache Stats
      run: ccache --show-stats

    - name: Run Tests
      working-directory: ./build/Tests
      run: ./GravisynthTests

  build-and-test-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Run Tests
      run: ./build/Tests/Release/GravisynthTests.exe
      shell: bash
