name: Gravisynth CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Test, and Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          libasound2-dev \
          libx11-dev \
          libxinerama-dev \
          libxext-dev \
          libxcomposite-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxrender-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev \
          libcurl4-openssl-dev \
          libgtk-3-dev \
          libjack-jackd2-dev \
          freeglut3-dev \
          libsoup-3.0-dev \
          libcurl4-openssl-dev \
          pkg-config \
          llvm \
          clang \
          clang-format \
          xvfb

    - name: Lint Check
      run: |
        find Source Tests -name "*.h" -o -name "*.cpp" | xargs clang-format --dry-run --Werror

    - name: Configure CMake
      run: |
        # Use clang for consistent coverage flags
        export CC=clang
        export CXX=clang++
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: ./build/Tests
      run: |
        export LLVM_PROFILE_FILE="default.profraw"
        xvfb-run ./GravisynthTests

    - name: Check Coverage
      run: xvfb-run bash scripts/coverage.sh
        
    - name: Upload Coverage Artifact (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          default.profdata
          default.profraw

  build-and-test-macos:
    name: Build and Test (macOS)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install cmake ninja

    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: ./build/Tests
      run: ./GravisynthTests
